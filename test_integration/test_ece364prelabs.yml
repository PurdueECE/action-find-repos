name: Default Test
on: [push]

jobs:
  test_ece364prelabs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - id: get_repos
        uses: ./
        with:
          org: PurdueECE364
          pattern: ^prelabs-.*$
          created_after: '2022-01-01T00:00:00'
          created_before: '2022-06-01T00:00:00'
      - name: print results
        run: "echo results: ${{ steps.get_repos.inputs.org }}"